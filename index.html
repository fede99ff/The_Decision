<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Decision</title>
    <style>
        /* STILE DARK E MINIMALISTA */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        #setup-area, #video-wrapper {
            width: 90%;
            max-width: 900px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 12px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        #countdown {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: bold;
            color: #ff3e3e;
            text-shadow: 0 0 20px rgba(255, 62, 62, 0.4);
            margin-bottom: 40px;
        }

        /* PULSANTE DI RIVELAZIONE */
        #reveal-btn {
            display: none;
            padding: 20px 50px;
            font-size: 1.1rem;
            background: transparent;
            color: white;
            border: 2px solid white;
            cursor: pointer;
            letter-spacing: 5px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        #reveal-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px #fff;
        }

        /* VIDEO LOCALE */
        #video-wrapper {
            display: none;
            animation: fadeIn 1.5s forwards;
        }

        video {
            width: 100%;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
            border: 1px solid #333;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="setup-area">
        <h1 id="main-title">The Decision</h1>
        <div id="countdown">Inizializzazione...</div>
        <button id="reveal-btn" onclick="playLocalVideo()">Scopri la Verità</button>
    </div>

    <div id="video-wrapper">
        <video id="decision-video" playsinline>
            <source src="video.mp4" type="video/mp4">
            Il tuo browser non supporta il formato video.
        </video>
    </div>

    <script>
        // --- CONFIGURAZIONE ---
        // Inserisci la data e l'ora esatta del tuo evento
        const TARGET_DATE = new Date("March 25, 2026 15:00:00").getTime();

        const countdownEl = document.getElementById("countdown");
        const btn = document.getElementById("reveal-btn");
        const title = document.getElementById("main-title");

        // --- TIMER ---
        const timer = setInterval(function() {
            const now = new Date().getTime();
            const diff = TARGET_DATE - now;

            if (diff <= 0) {
                clearInterval(timer);
                countdownEl.style.display = "none";
                title.innerText = "IL MOMENTO È ARRIVATO";
                btn.style.display = "inline-block";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            countdownEl.innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        }, 1000);

        // --- FUNZIONE PLAY VIDEO ---
        function playLocalVideo() {
            const setupArea = document.getElementById("setup-area");
            const videoWrapper = document.getElementById("video-wrapper");
            const video = document.getElementById("decision-video");

            setupArea.style.display = "none";
            videoWrapper.style.display = "block";
            
            // Avvia il video con audio
            video.play();
            
            // Opzionale: metti il video a tutto schermo automaticamente
            if (video.requestFullscreen) {
                video.requestFullscreen();
            }
        }
    </script>
</body>
</html>
